name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            pkg-config \
            libwayland-dev \
            libx11-xcb-dev \
            libxcb-dri2-0-dev \
            libgl1-mesa-dev \
            libxcb-icccm4-dev \
            libxcursor-dev \
            libxcb-{render,shape,xfixes}0-dev \
            libfontconfig1-dev \
            libfreetype-dev

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo format
        run: cargo fmt --all -- --check

      - name: cargo build
        run: cargo build --verbose

      - name: cargo test
        run: cargo test --verbose

      - name: cargo lint
        run: cargo clippy --no-deps --all-targets --all-features
